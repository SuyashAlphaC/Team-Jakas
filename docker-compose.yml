services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./fixtures:/app/fixtures:ro
      - ./config:/app/config:ro
      - ./data/models:/app/data/models
      - observability-data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - OBS_ROOT=/app
      - OBS_USE_ML=true
      - GRAFANA_URL=http://localhost:3001
      - GRAFANA_INTERNAL_URL=http://grafana:3000
      - GRAFANA_ADMIN_USER=admin
      - GRAFANA_ADMIN_PASSWORD=observability
      - GRAFANA_ANNOTATIONS_ENABLED=true
      - MPLCONFIGDIR=/app/data/.matplotlib
      - HOME=/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
    depends_on:
      backend:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.2.2
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=observability
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_UNIFIED_ALERTING_ENABLED=true
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:5173:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  observability-data:
