              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: sum(increase(observability_incidents_created_total[2m]))
              instant: true
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0, 0]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: []
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              refId: B
              type: threshold
        noDataState: OK
        execErrState: Error
        for: 0s
        dashboardUid: domain-cpu-telemetry
        panelId: 9
        annotations:
          summary: "RCA incident created from model alert"
          description: "New incident persisted with causal graph and remediation ladder."
        labels:
          severity: critical
          team: jakas
          verdict: incident

      - uid: obs-any-model-alert
        title: Model — Any Alert Active
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: observability_fusion_alert_active
              instant: true
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0, 0]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: []
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              refId: B
              type: threshold
        noDataState: OK
        execErrState: Error
        for: 0s
        dashboardUid: domain-cpu-telemetry
        panelId: 9
        annotations:
          summary: "Fusion engine reports at least one alerting domain"
          description: "Umbrella alert — fires whenever attack, internal_fault, or unexplained is active."
        labels:
          severity: info
          team: jakas
          verdict: any
